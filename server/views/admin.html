<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="robots"
content="noindex,nofollow">

<title>
Meridian Admin
</title>

<link
rel="stylesheet"
href="/css/admin.css">

</head>

<body>

<div class="admin-container">

    <header class="admin-header">

        <h1>
            Meridian Admin
        </h1>

        <div class="admin-header-actions">

            <span
            id="adminIdentity"
            class="admin-identity">
                Administrator
            </span>

            <button
            id="adminLogoutBtn"
            class="admin-logout-button"
            type="button">
                Sign Out
            </button>

        </div>

    </header>

    <main class="admin-layout">

        <aside class="admin-sidebar">

            <section class="admin-panel">

                <h2>
                    访客会话
                </h2>

                <div
                id="visitorStats"
                class="visitor-stats"
                aria-label="访客分类统计"
                aria-live="polite">

                    <div class="visitor-stat-card">
                        <span class="visitor-stat-label">
                            有效会话
                        </span>
                        <strong
                        id="activeConversationsCount"
                        class="visitor-stat-value">
                            0
                        </strong>
                    </div>

                    <div class="visitor-stat-card">
                        <span class="visitor-stat-label">
                            未发言访客
                        </span>
                        <strong
                        id="silentVisitorsCount"
                        class="visitor-stat-value">
                            0
                        </strong>
                    </div>

                    <div class="visitor-stat-card">
                        <span class="visitor-stat-label">
                            当前在线
                        </span>
                        <strong
                        id="onlineVisitorsCount"
                        class="visitor-stat-value">
                            0
                        </strong>
                    </div>

                    <div class="visitor-stat-card">
                        <span class="visitor-stat-label">
                            在线未发言
                        </span>
                        <strong
                        id="onlineSilentVisitorsCount"
                        class="visitor-stat-value">
                            0
                        </strong>
                    </div>

                </div>

                <div id="sessions">
                </div>

            </section>

            <section class="admin-panel">

                <h2>
                    在线访客
                </h2>

                <div id="onlineUsers">
                </div>

            </section>

            <section class="admin-panel">

                <h2>
                    离线访客
                </h2>

                <div id="offlineUsers">
                </div>

            </section>

        </aside>

        <section class="admin-chat">

            <section
            id="adminAiPanel"
            class="admin-ai-panel">

                <div class="admin-ai-heading">

                    <div>

                        <strong>
                            GPT-5.6 AI
                        </strong>

                        <span
                        id="adminAiConnectionStatus"
                        class="admin-ai-connection-status">
                            Checking...
                        </span>

                    </div>

                    <span
                    id="adminAiSessionStatus"
                    class="admin-ai-session-status">
                        Select a conversation
                    </span>

                </div>

                <div
                class="admin-ai-mode-buttons"
                role="group"
                aria-label="AI mode">

                    <button
                    type="button"
                    data-ai-mode="off">
                        OFF
                    </button>

                    <button
                    type="button"
                    data-ai-mode="assist">
                        ASSIST
                    </button>

                    <button
                    type="button"
                    data-ai-mode="auto">
                        AUTO
                    </button>

                </div>

                <div
                id="adminAiSuggestionArea"
                class="admin-ai-suggestion-area"
                hidden>

                    <textarea
                    id="adminAiSuggestion"
                    readonly
                    placeholder="AI suggestion will appear here."></textarea>

                    <div class="admin-ai-suggestion-actions">

                        <button
                        id="adminAiGenerateBtn"
                        type="button">
                            Generate
                        </button>

                        <button
                        id="adminAiUseBtn"
                        type="button">
                            Use Suggestion
                        </button>

                    </div>

                </div>

                <p
                id="adminAiMessage"
                class="admin-ai-message"
                aria-live="polite">
                </p>

            </section>

            <div
            id="adminMessages"
            class="admin-messages">
            </div>

            <div class="admin-input">

                <button
                id="adminImageBtn"
                type="button">
                    📷
                </button>

                <button
                id="adminWhatsAppCardBtn"
                type="button"
                title="发送 WhatsApp 链接卡片">
                    WA
                </button>

                <button
                id="adminFileBtn"
                type="button">
                    📎
                </button>

                <input
                id="adminReplyInput"
                type="text"
                placeholder="输入回复内容">

                <button
                id="adminSendBtn"
                type="button">
                    发送
                </button>

                <input
                id="adminImageInput"
                type="file"
                accept="image/*"
                hidden>

                <input
                id="adminFileInput"
                type="file"
                hidden>

            </div>

        </section>

    </main>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="/js/admin/admin-auth.js"></script>

<script src="/js/core/events.js"></script>
<script src="/js/core/logger.js"></script>
<script src="/js/core/time.js"></script>
<script src="/js/core/message-adapter.js"></script>

<script src="/js/admin/conversation-store.js"></script>
<script src="/js/admin/history-loader.js"></script>
<script src="/js/admin/admin-state.js"></script>
<script src="/js/admin/admin-ui.js"></script>
<script src="/js/admin/admin-ai.js"></script>

<script src="/js/upload.js"></script>
<script src="/js/admin/admin-upload.js"></script>

<script src="/js/admin/admin-socket.js"></script>
<script src="/js/admin/admin-link-card.js"></script>
<script src="/js/admin/admin.js"></script>

</body>

</html>
